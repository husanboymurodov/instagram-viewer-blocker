<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }
    h2 { font-size: 15px; margin-bottom: 12px; color: #ed4956; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #ed4956; }
    .row { display: flex; gap: 6px; margin-bottom: 8px; }
    button {
      flex: 1;
      padding: 9px;
      border-radius: 6px;
      border: none;
      background: #ed4956;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
    }
    button.secondary:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: default; }
    #infoBox {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    #infoBox.visible { display: flex; }
    #infoBox .row { margin: 0; gap: 0; justify-content: space-between; }
    #infoBox .label { color: #666; }
    #infoBox .val   { color: #fff; font-weight: 500; }
    #status { font-size: 12px; text-align: center; min-height: 16px; }
    .ok  { color: #4CAF50; }
    .err { color: #ed4956; }
  </style>
</head>
<body>
  <h2>IG Blocker</h2>
  <input id="username" type="text" placeholder="@username" autocomplete="off" spellcheck="false" />
  <div class="row">
    <button id="infoBtn" class="secondary">Profile Info</button>
    <button id="blockBtn">Block</button>
  </div>
  <div id="infoBox">
    <div class="row"><span class="label">Username</span><span class="val" id="iUsername">—</span></div>
    <div class="row"><span class="label">User ID</span><span class="val" id="iId">—</span></div>
    <div class="row"><span class="label">Followers</span><span class="val" id="iFollowers">—</span></div>
    <div class="row"><span class="label">Following</span><span class="val" id="iFollowing">—</span></div>
    <div class="row"><span class="label">Posts</span><span class="val" id="iPosts">—</span></div>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
