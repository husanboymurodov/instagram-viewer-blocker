<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }
    h2 { font-size: 15px; margin-bottom: 12px; color: #ed4956; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #ed4956; }
    .row { display: flex; gap: 6px; margin-bottom: 8px; }
    button {
      flex: 1;
      padding: 9px;
      border-radius: 6px;
      border: none;
      background: #ed4956;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
    }
    button.secondary:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: default; }
    #infoBox {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    #infoBox.visible { display: flex; }
    #infoBox .row { margin: 0; gap: 0; justify-content: space-between; }
    #infoBox .label { color: #666; flex-shrink: 0; }
    #infoBox .val   { color: #fff; font-weight: 500; max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    #infoBox .val.wrap { white-space: normal; word-break: break-word; }
    #avatarWrap {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    #avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
      display: none;
    }
    #noPhoto {
      display: none;
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 6px 0;
    }
    #status { font-size: 12px; text-align: center; min-height: 16px; }
    .ok  { color: #4CAF50; }
    .err { color: #ed4956; }
    #footer { margin-top: 10px; text-align: center; font-size: 11px; color: #444; }
    #footer a { color: #555; text-decoration: none; }
    #footer a:hover { color: #888; }
  </style>
</head>
<body>
  <h2>Instagram Viewer & Blocker</h2>
  <input id="username" type="text" placeholder="@username" autocomplete="off" spellcheck="false" />
  <div class="row">
    <button id="infoBtn" class="secondary">Profile Info</button>
    <button id="blockBtn">Block</button>
  </div>
  <div id="infoBox">
    <div id="avatarWrap">
      <img id="avatar" alt="Profile picture" />
      <span id="noPhoto">No profile photo</span>
    </div>
    <div class="row"><span class="label">Username</span><span class="val" id="iUsername">—</span></div>
    <div class="row"><span class="label">Full Name</span><span class="val" id="iFullName">—</span></div>
    <div class="row"><span class="label">User ID</span><span class="val" id="iId">—</span></div>
    <div class="row"><span class="label">Followers</span><span class="val" id="iFollowers">—</span></div>
    <div class="row"><span class="label">Following</span><span class="val" id="iFollowing">—</span></div>
    <div class="row"><span class="label">Posts</span><span class="val" id="iPosts">—</span></div>
    <div class="row" id="rowBio" style="display:none"><span class="label">Bio</span><span class="val wrap" id="iBio">—</span></div>
    <div class="row" id="rowUrl" style="display:none"><span class="label">Link</span><a class="val wrap" id="iUrl" style="color:#58a6ff" target="_blank" rel="noopener noreferrer">—</a></div>
  </div>
  <div id="status"></div>
  <div id="footer">© <a href="https://github.com/husanboymurodov/instagram-viewer-blocker" target="_blank" rel="noopener noreferrer">Instagram Viewer & Blocker</a></div>
  <script src="popup.js"></script>
</body>
</html>
